name: Build and deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA5E5586DDDB4831A6CC12A1B835DE49
            }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9DAE1FE2422446CD9D7E5257C6538C53
            }}
          subscription-id: ${{
            secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_874ACE108B994B318B0A24DA79767AB7
            }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry crmyagents \
            --image caller-agent:${{ github.sha }} \
            --file api/Dockerfile \
            api/

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-caller-agent \
            --resource-group rg-myagents \
            --image crmyagents.azurecr.io/caller-agent:${{ github.sha }} \
            --set-env-vars \
              BUILD_NUMBER=${{ github.run_number }} \
              BUILD_SHA=${{ github.sha }} \
              BUILD_REF=${{ github.ref_name }} \
              BUILD_RUN_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
              BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
